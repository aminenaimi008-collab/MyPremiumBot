app = 'mypremiumbot'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  DISCORD_TOKEN = ''
  OWNER_ID = '1513129431214854236'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
